[package]
name = "rpo-core"
description = "Core astrodynamics library for RPO mission planning"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
nalgebra = { version = "0.34", features = ["serde-serialize"] }
hifitime = "4"
serde = { version = "1", features = ["derive"] }
nyx-space = "2.3.1"
anise = "0.9"
rand = "0.8"
rand_distr = "0.4"
rand_chacha = "0.3"
rayon = "1.10"

[dev-dependencies]
serde_json = "1"
